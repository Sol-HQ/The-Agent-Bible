# ─────────────────────────────────────────────────────────────────────────────
# PR Security Agent Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Runs scripts/pr_security_agent.py on every pull request that touches the
# implementations/ folder.  The job fails (exit 1) if any Python file contains
# a dangerous shell/exec command without a Human-in-the-Loop input() safeguard.
# ─────────────────────────────────────────────────────────────────────────────

name: PR Security Agent

on:
  pull_request:
    paths:
      - "implementations/**"

permissions:
  contents: read

jobs:
  security-scan:
    name: Scan for Dangerous Commands Without HITL Safeguards
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the full history so git-diff works across branches ──────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python runtime ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Determine which Python files changed in this PR ─────────────────
      - name: Identify changed Python files in implementations/
        id: changed-files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          # Collect Added, Copied, Modified, Renamed, Type-changed .py files
          # under implementations/ and join them with a space for xargs.
          CHANGED=$(
            git diff --name-only --diff-filter=ACMRT \
              "origin/${{ github.base_ref }}...HEAD" \
            | grep '^implementations/.*\.py$' \
            | tr '\n' ' ' \
            || true
          )

          echo "changed_files=${CHANGED}" >> "$GITHUB_OUTPUT"

          if [ -z "$CHANGED" ]; then
            echo "No Python files changed in implementations/ — nothing to scan."
          else
            echo "Files queued for scanning: ${CHANGED}"
          fi

      # ── 4. Run the security scanner ────────────────────────────────────────
      - name: Run PR Security Agent
        run: |
          CHANGED="${{ steps.changed-files.outputs.changed_files }}"

          if [ -z "$CHANGED" ]; then
            echo "Skipping scan — no relevant files."
            exit 0
          fi

          # Word-split is intentional here: $CHANGED is a space-separated list
          # of paths that contain no whitespace (standard Git paths).
          # shellcheck disable=SC2086
          python scripts/pr_security_agent.py $CHANGED
