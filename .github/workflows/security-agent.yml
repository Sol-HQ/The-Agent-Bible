name: 🛡️ Automated Security Agent

# This tells the agent to wake up whenever a Pull Request is opened or updated
on:
  pull_request:
    paths:
      - 'implementations/**/*.py'

permissions:
  contents: read

jobs:
  security-scan:
    name: Scan for Dangerous Commands Without HITL Safeguards
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 🔍 Identify changed Python files
        id: changed-files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          # Collect .py files under implementations/ that were Added or Modified
          CHANGED=$(
            git diff --name-only --diff-filter=ACMRT \
              "origin/${{ github.base_ref }}...HEAD" \
            | grep '^implementations/.*\.py$' \
            | tr '\n' ' ' \
            || true
          )

          echo "changed_files=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: 🕵️‍♂️ Run Security Agent Scanner
        # SECURITY: pass the output through an env-var, NOT via ${{ }} template
        # interpolation inside the shell body, to prevent script injection.
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
        run: |
          if [ -z "$CHANGED_FILES" ]; then
            echo "✅ No Python files changed in implementations/ — nothing to scan."
            exit 0
          fi

          if [ -f scripts/pr_security_agent.py ]; then
            # Word-split is intentional: CHANGED_FILES is space-separated paths
            # shellcheck disable=SC2086
            python scripts/pr_security_agent.py $CHANGED_FILES
          else
            echo "⚠️ Warning: scripts/pr_security_agent.py not found. Skipping security scan."
          fi