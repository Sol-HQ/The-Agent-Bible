name: 📚 Auto-Update Docs

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-trends:
    name: Fetch Latest Agent Research & Update Docs
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🤖 Run auto-update script
        run: python scripts/auto_update_trends.py

      - name: 🔗 Validate internal links
        run: python scripts/validate_links.py docs/

      - name: 📬 Open Pull Request with updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'docs(auto): weekly trends and link validation update'
          title: '🤖 Weekly Auto-Update: Agent Research Trends'
          body: |
            This PR was automatically generated by the `auto_update_trends.py` script.

            **What changed:**
            - Fetched latest agent research from arXiv and added summaries to relevant chapters.
            - Validated all internal Markdown links.

            *Review and merge if the additions look accurate.*
          branch: auto-update/weekly-trends
          delete-branch: true
          labels: 'documentation,automated'
